<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Cart</title>

<link rel="stylesheet"
href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>
    
<button class="back-btn" onclick="history.back()">

    ←

</button>
<section class="cart-page">

<h1>🛒 Your Order</h1>

<div id="cart-items">

</div>

<div class="cart-summary">

<h3>

Subtotal:

<span id="subtotal">

₦0

</span>

</h3>

<a href="checkout.html"
class="review-btn">

Proceed To Checkout

</a>

</div>

</section>

<section class="thank-you-section">

    <div class="thank-overlay"></div>

    <div class="thank-content">

        <span class="thank-badge">
            THANK YOU
        </span>

        <h2>
            Thank you for being part of our story.
        </h2>

        <p>
            Whether you discovered us through a friend's recommendation,
            a late-night craving or a catering event, we are honoured
            to be part of your food moments.
        </p>

        <div class="thank-buttons">

            <a href="index.html#categories" class="menu-btn">
                View Our Menu
            </a>

            <a href="https://wa.me/2349033035249?text=Hello%20Gineer%20Tasty%20Grills,%20I%20would%20like%20to%20place%20an%20order."
               target="_blank"
               class="whatsapp-btn">

                Order on WhatsApp

            </a>

        </div>

    </div>

</section>




<script src="js/app.js"></script>

</body>
</html>
