<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<link rel="stylesheet"
href="css/style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
    <body>
    <button class="back-btn" onclick="history.back()">

    ←

</button>

<section class="checkout">

<div class="checkout-container">

<div class="checkout-form">

<h2>Checkout</h2>

<input
type="text"
id="customer-name"
placeholder="Full Name">

<input
type="tel"
id="customer-phone"
placeholder="Phone Number">

<div class="branch-selection">

<h3>Select a Branch👇</h3>

<div class="branch-grid">

<div class="branch-card"
data-branch="Gineer Tasty Grills - Nsukka">

<i class="fa-solid fa-location-dot bounce-icon"></i> Nsukka Branch

</div>

<div class="branch-card"
data-branch="Gineer Tasty Grills - Enugu">

<i class="fa-solid fa-location-dot bounce-icon"></i> Enugu Branch

</div>

<div class="branch-card"
data-branch="Gineer Tasty Grills - Abuja">

<i class="fa-solid fa-location-dot bounce-icon"></i> Abuja Branch

</div>

<div class="branch-card"
data-branch="Gineer Tasty Grills - Lagos">

<i class="fa-solid fa-location-dot bounce-icon"></i></i> Lagos Branch

</div>

</div>

</div>

<div class="order-type">

<label>

<input
type="radio"
name="orderType"
value="Pickup"
checked>

Pickup

</label>

<label>

<input
type="radio"
name="orderType"
value="Delivery">

Delivery

</label>

</div>

<div id="address-box">

<textarea id="address" placeholder="Enter your delivery address"></textarea>

</div>

<button
id="place-order">

Place Order

</button>

</div>

<div class="order-summary">

<h2>Your Order</h2>

<div id="checkout-items">

</div>

<h3>

Subtotal:
<span id="checkout-subtotal">

₦0

</span>

</h3>

<h3>

Delivery:
<span id="delivery-fee">

₦0

</span>

</h3>

<h2>

Total:
<span id="checkout-total">

₦0

</span>

</h2>

</div>

</div>

</section>

<script src="js/app.js"></script>

</body>

</html>
